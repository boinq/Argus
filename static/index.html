<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Argus Denmark Hazard Monitor</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQngD8nM1xJfyw18mTd6fL7uJkKc9RE="
      crossorigin=""
    />
    <link rel="stylesheet" href="static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="map-panel" aria-label="Satellite map of Denmark">
        <div id="map"></div>
        <button
          class="menu-toggle"
          id="menu-toggle"
          type="button"
          aria-label="Open menu"
          aria-controls="side-menu"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="side-menu" id="side-menu" aria-label="Main menu" aria-hidden="true">
          <div class="menu-header">
            <p class="eyebrow">Argus</p>
            <h2>Operations</h2>
          </div>
          <button type="button" class="menu-item active" data-view="events">Map</button>
          <button type="button" class="menu-item">Sensors</button>
          <button type="button" class="menu-item">Alerts</button>
          <button type="button" class="menu-item">Sources</button>
          <button type="button" class="menu-item">Reports</button>
          <button type="button" class="menu-item" data-view="settings">Settings</button>
        </nav>
        <div class="menu-scrim" id="menu-scrim" hidden></div>
        <div class="topbar">
          <div>
            <p class="eyebrow">Argus</p>
            <h1>Denmark Hazard Monitor</h1>
          </div>
          <div class="status-pill" id="api-status">Connecting</div>
        </div>
        <div class="legend" aria-label="Severity legend">
          <span><i class="severity critical"></i>Critical</span>
          <span><i class="severity high"></i>High</span>
          <span><i class="severity medium"></i>Medium</span>
          <span><i class="severity low"></i>Low</span>
        </div>
      </section>

      <aside class="event-panel" aria-label="Hazard event feed">
        <div class="panel-view" id="events-view">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Live Feed</p>
              <h2>Events</h2>
            </div>
            <select id="category-filter" aria-label="Filter by category">
              <option value="all">All</option>
              <option value="weather">Weather</option>
              <option value="hybrid">Hybrid</option>
              <option value="electrical">Electrical</option>
              <option value="food">Food</option>
              <option value="health">Health</option>
              <option value="transport">Transport</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="summary-grid" id="summary"></div>
          <div class="event-list" id="event-list"></div>
        </div>

        <div class="panel-view" id="settings-view" hidden>
          <div class="panel-header">
            <div>
              <p class="eyebrow">Configuration</p>
              <h2>Settings</h2>
            </div>
            <button type="submit" class="save-button" form="settings-form">Save</button>
          </div>
          <form class="settings-form" id="settings-form">
            <label>
              <span>Public URL</span>
              <input
                id="public-base-url"
                name="public_base_url"
                type="url"
                placeholder="https://argus.example.dk"
              />
            </label>
            <label>
              <span>Path prefix</span>
              <input id="path-prefix" name="path_prefix" type="text" placeholder="/argus" />
            </label>
            <label>
              <span>Trusted hosts</span>
              <input
                id="trusted-hosts"
                name="trusted_hosts"
                type="text"
                placeholder="argus.example.dk,localhost"
              />
            </label>
            <label class="checkbox-row">
              <input id="proxy-headers" name="proxy_headers" type="checkbox" />
              <span>Trust forwarded proxy headers</span>
            </label>
          </form>
          <div class="settings-note" id="settings-note">
            Runtime proxy values are read from environment variables on startup.
          </div>
          <pre class="proxy-snippet" id="proxy-snippet"></pre>
        </div>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="static/app.js"></script>
  </body>
</html>
