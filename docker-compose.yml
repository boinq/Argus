services:
  argus:
    build: .
    ports:
      - "8000:8000"
    environment:
      ARGUS_DB_PATH: /data/argus.db
      ARGUS_PUBLIC_BASE_URL: ${ARGUS_PUBLIC_BASE_URL:-http://localhost:8000}
      ARGUS_ROOT_PATH: ${ARGUS_ROOT_PATH:-}
      ARGUS_TRUSTED_HOSTS: ${ARGUS_TRUSTED_HOSTS:-*}
      ARGUS_PROXY_HEADERS: ${ARGUS_PROXY_HEADERS:-true}
      ARGUS_FORWARDED_ALLOW_IPS: ${ARGUS_FORWARDED_ALLOW_IPS:-*}
      ARGUS_NTFY_ENABLED: ${ARGUS_NTFY_ENABLED:-false}
      ARGUS_NTFY_SERVER_URL: ${ARGUS_NTFY_SERVER_URL:-https://ntfy.sh}
      ARGUS_NTFY_TOPIC: ${ARGUS_NTFY_TOPIC:-}
      ARGUS_NTFY_TOKEN: ${ARGUS_NTFY_TOKEN:-}
      ARGUS_NTFY_PRIORITY: ${ARGUS_NTFY_PRIORITY:-default}
    volumes:
      - argus-data:/data
    restart: unless-stopped

volumes:
  argus-data:
